<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MW Inc Support</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      body {
        max-width: 840px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      h1 {
        margin-bottom: 8px;
      }

      a {
        color: #0a66c2;
      }

      .meta {
        color: #666;
      }

      .apps {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        margin-top: 28px;
      }

      .app {
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 8px;
        padding: 20px;
      }

      .app h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <h1>MW Inc Support</h1>
    <p class="meta">Support and privacy pages for MW Inc apps.</p>

    <section class="apps" aria-label="Apps">
      <article class="app">
        <h2>LocalWhisper</h2>
        <p>Private on-device transcription for macOS.</p>
        <p>
          <a href="./localwhisper/">Support</a><br>
          <a href="./localwhisper/privacy.html">Privacy Policy</a>
        </p>
      </article>

      <article class="app">
        <h2>Lockin App Blocker</h2>
        <p>App and website blocking with deliberate unlock friction and timed ON/OFF sessions.</p>
        <p>
          <a href="./lockin/">Support</a><br>
          <a href="./lockin/privacy.html">Privacy Policy</a>
        </p>
      </article>
    </section>
  </body>
</html>
